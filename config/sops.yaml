# SOPS encryption rules for secrets management.
# Replace the age public key(s) with your own.
# See: https://github.com/getsops/sops
# See: https://github.com/ericbusboom/dotconfig

# Generate an age key with: age-keygen -o ~/.config/sops/age/keys.txt
# Replace the placeholder below with your actual age PUBLIC key (age1xxx...).

creation_rules:
  # Secrets companion files (*.secrets.env, etc.)
  - path_regex: '.+\.secrets\.(?:env|json|yaml|yml|txt|conf)$'
    age: >-
      age1xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx,
      age1v3f2rncavwjzsvlhdn6v4wxkfsm2da8sl5snl5wa3mw7zqlvhyyqmx8q0d

  # Standard secrets files (secrets.env, etc.)
  - path_regex: '.+/secrets\.(?:env|json|yaml|yml|txt|conf)$'
    age: >-
      age1xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx,
      age1v3f2rncavwjzsvlhdn6v4wxkfsm2da8sl5snl5wa3mw7zqlvhyyqmx8q0d
